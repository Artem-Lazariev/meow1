<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="slider">
        <input type="range" min="1" max="100" value="50" class="slider__input" />
        <img src="https://via.placeholder.com/300x300" class="slider__image" style="width: 300px;" />
    </div>
<style>
    .slider {
        max-width: 400px;
        margin: 20px auto;
        text-align: center;
    }

    .slider__input {
        width: 100%;
    }

    .slider__image {
        display: block;
        margin: 20px auto;
        max-width: 100%;
        transition: width 0.2s ease;
    }
    body {
        height: 100vh; 
        margin: 0;
        overflow: hidden;
    }

    #box {
        width: 50px;
        height: 50px;
        background-color: red;
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none; 
        transition: all 0.1s ease-out;
    }
</style>
    <div id="box"></div>
    <script src="
https://cdn.jsdelivr.net/npm/lodash@4.18.1/lodash.min.js
"></script>
<script src="index.js"></script>
</body>
<script src="
https://cdn.jsdelivr.net/npm/lodash@4.18.1/lodash.min.js
"></script>

</html>
